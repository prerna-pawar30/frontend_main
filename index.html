<!doctype html>
<html lang="en">
  <head>
    <!-- Character Encoding -->
    <meta charset="UTF-8" />

    <!-- Mobile Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO Title -->
    <title>
      Digident | Digital Dental Solutions, CAD/CAM & ScanBridge Products
    </title>

    <!-- Meta Description -->
    <meta
      name="description"
      content="Digident provides advanced digital dental solutions, CAD/CAM products, ScanBridge libraries, implant components, and modern dental technologies for clinics and labs."
    />

    <!-- SEO Keywords -->
    <meta
      name="keywords"
      content="Digident, dental solutions, CAD CAM, ScanBridge, implant components, digital dentistry, dental products"
    />

    <!-- Author -->
    <meta name="author" content="Digident" />

    <!-- Robots -->
    <meta name="robots" content="index, follow" />

    <!-- Canonical -->
    <link rel="canonical" href="https://digident.in/" />

    <!-- Open Graph SEO -->
    <meta
      property="og:title"
      content="Digident | Digital Dental Solutions"
    />
    <meta
      property="og:description"
      content="Advanced CAD/CAM, ScanBridge libraries, implant components, and digital dental products."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://digident.in/" />
    <meta property="og:image" content="https://digident.in/logo.png" />

    <!-- Twitter SEO -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Digident | Digital Dental Solutions"
    />
    <meta
      name="twitter:description"
      content="Advanced CAD/CAM, ScanBridge libraries, implant components, and digital dental products."
    />
    <meta name="twitter:image" content="https://digident.in/logo.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />

    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
  </head>

  <body>
    <!-- Hidden SEO H1 -->
    <h1 style="display:none;">
      Digident Digital Dental Solutions
    </h1>

    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
